[advisories]
version = 2
yanked = "deny"
ignore = [
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.3.3 is used for in-memory demo serialization and is also pulled transitively by madsim; the advisory is unmaintained-only and has no safe upgrade path." },
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
